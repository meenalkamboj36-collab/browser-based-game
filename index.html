<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Quiz Game</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../CSS/style.css">
</head>

<body>

<div class="game-card">

<div id="startScreen" class="start-bg">
<div class="overlay text-center">
<h1 class="title">TIME TO QUIZ</h1>
<p>Are You Ready?</p>
<button class="btn btn-warning btn-lg" onclick="startQuiz()">START</button>
</div>
</div>


<div id="categoryScreen" class="quiz-bg hide">
<div class="overlay2 text-center text-white">

<h2 class="cat-title">Choose Category</h2>

<div class="row mt-4">

<div class="col-6 mb-3">
<div class="cat-card" onclick="selectCategory(23)">
<img src="https://cdn-icons-png.flaticon.com/512/1682/1682526.png">
<p>History</p>
</div>
</div>

<div class="col-6 mb-3">
<div class="cat-card" onclick="selectCategory(17)">
    <img src="https://cdn-icons-png.flaticon.com/512/1995/1995525.png">

<p>Science</p>
</div>
</div>

<div class="col-6 mb-3">
<div class="cat-card" onclick="selectCategory(21)">
<img src="https://cdn-icons-png.flaticon.com/512/3405/3405381.png">
<p>Sports</p>
</div>
</div>

<div class="col-6 mb-3">
<div class="cat-card" onclick="selectCategory(9)">
    <img src="https://cdn-icons-png.flaticon.com/512/3647/3647322.png">

<p>General</p>
</div>
</div>

</div>

</div>
</div>


<div id="quizScreen" class="quiz-bg hide">
<div class="overlay2">

<div class="d-flex justify-content-between text-white">
<span>Score: <b id="score">0</b></span>
<span>Time: <b id="time">15</b></span>
</div>

<div class="progress mt-2">
<div id="progressBar" class="progress-bar bg-success"></div>
</div>

<div class="question-box mt-3">
<h4 id="question"></h4>
</div>

<div id="options" class="mt-3"></div>
<div id="reaction" class="text-center mt-2"></div>

</div>
</div>


<div id="resultScreen" class="hide text-center p-4">
<h2 id="finalText"></h2>
<img id="resultImg" width="200" class="mt-3"/>
<br>
<button class="btn btn-primary mt-3" onclick="location.reload()">Play Again</button>
</div>

</div>

<script src="../JS/script.js"></script>
</body>
</html>
